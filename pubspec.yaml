name: soulguide
description: "SoulGuide - AI-powered personalized content recommendations"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # HTTP & Networking
  dio: ^5.4.3

  # Environment Variables
  flutter_dotenv: ^5.1.0

  # Local Storage
  shared_preferences: ^2.3.2

  # Image Caching
  cached_network_image: ^3.3.1

  # Skeleton Loading
  shimmer: ^3.0.0

  # Charts
  fl_chart: ^0.68.0

  # Fonts
  google_fonts: ^6.2.1

  # Internationalization
  intl: ^0.19.0

  # URL Launcher
  url_launcher: ^6.3.0

  # HTML Parsing for Web Scraping
  html: ^0.15.4

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
